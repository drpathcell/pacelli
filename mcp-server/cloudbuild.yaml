# Google Cloud Build configuration for deploying Pacelli MCP server.
#
# Deploy:
#   gcloud builds submit --config=cloudbuild.yaml .
#
# Required substitutions (set via Cloud Build triggers or --substitutions):
#   _REGION:             Cloud Run region (default: us-central1)
#   _SERVICE_NAME:       Cloud Run service name (default: pacelli-mcp)
#   _PACELLI_API_URL:    Cloud Functions base URL
#
# The AUTH_TOKEN should be set as a Cloud Run env var or Secret Manager ref
# (not baked into the image).

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: pacelli-mcp

steps:
  # Build the container
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '.'

  # Push to GCR
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--port=3000'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--timeout=300'
      - '--allow-unauthenticated'
      - '--set-env-vars=PACELLI_API_URL=${_PACELLI_API_URL}'

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
