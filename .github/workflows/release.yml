name: Release

# Trigger: push a version tag like v1.0.0+42
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+\+[0-9]+'
jobs:
  # ── iOS → TestFlight ──────────────────────────────────────────────────────────
  ios-beta:
    name: iOS → TestFlight
    # PINNED: macos-latest (currently macos-15) ships OpenSSL 3.5+ which
    # rejects Apple's ASC P-256 key curve naming via fastlane's spaceship
    # token.rb (fastlane/fastlane#20553). macos-14 has OpenSSL 3.0 which
    # parses the .p8 fine. Revert to macos-latest once fastlane#20553 lands.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Sanity-check iOS secrets
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: |
          : "${ASC_KEY_ID:?ASC_KEY_ID secret is empty}"
          : "${ASC_ISSUER_ID:?ASC_ISSUER_ID secret is empty}"
          : "${ASC_KEY_CONTENT:?ASC_KEY_CONTENT secret is empty}"
          echo "All required iOS secrets are present."

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install CocoaPods
        run: cd ios && pod install --repo-update

      - name: Run fastlane ios beta
        env:
          MATCH_GIT_URL:      ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD:     ${{ secrets.MATCH_PASSWORD }}
          ASC_KEY_ID:         ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID:      ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT:    ${{ secrets.ASC_KEY_CONTENT }}
          MATCH_KEYCHAIN_NAME: build_keychain
          MATCH_KEYCHAIN_PASSWORD: ${{ secrets.MATCH_KEYCHAIN_PASSWORD }}
        run: bundle exec fastlane ios beta
