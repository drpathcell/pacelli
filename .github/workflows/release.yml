name: Release

# Trigger: push a version tag like v1.0.0+42
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+\+[0-9]+'

jobs:
  # ── iOS → TestFlight ──────────────────────────────────────────────────────────
  ios-beta:
    name: iOS → TestFlight
    # PINNED: macos-latest (currently macos-15) ships OpenSSL 3.5+ which
    # rejects Apple's ASC P-256 key curve naming via fastlane's spaceship
    # token.rb (fastlane/fastlane#20553). macos-14 has OpenSSL 3.0 which
    # parses the .p8 fine. Revert to macos-latest once fastlane#20553 lands.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install CocoaPods
        run: cd ios && pod install --repo-update

      - name: Run fastlane ios beta
        env:
          MATCH_GIT_URL:      ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD:     ${{ secrets.MATCH_PASSWORD }}
          APPLE_ID:           ${{ secrets.APPLE_ID }}
          ITC_TEAM_ID:        ${{ secrets.ITC_TEAM_ID }}
          ASC_KEY_ID:         ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID:      ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT:    ${{ secrets.ASC_KEY_CONTENT }}
          MATCH_KEYCHAIN_NAME: build_keychain
          MATCH_KEYCHAIN_PASSWORD: ${{ secrets.MATCH_KEYCHAIN_PASSWORD }}
        run: bundle exec fastlane ios beta

  # ── Android → Play Store Internal ────────────────────────────────────────────
  android-beta:
    name: Android → Play Store Internal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Flutter pub get
        run: flutter pub get

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Run fastlane android beta
        env:
          ANDROID_KEYSTORE_BASE64:  ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD:   ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD:     ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS:        ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PATH:    release.keystore
          GOOGLE_PLAY_JSON_KEY:     ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
        run: bundle exec fastlane android beta
