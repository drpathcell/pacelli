name: Release

# Trigger: push a version tag like v1.0.0+42
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+\+[0-9]+'
jobs:
  # ── iOS → TestFlight ──────────────────────────────────────────────────────────
  ios-beta:
    name: iOS → TestFlight
    # PIN: macos-26 ships Xcode 26 / iOS SDK 26, required by App Store Connect
    # as of April 2026 (rejects uploads built with iOS SDK < 26):
    #   "SDK version issue. This app was built with the iOS 18.5 SDK. All
    #    iOS and iPadOS apps must be built with the iOS 26 SDK or later."
    # macos-15 (Xcode 16) compiled fine but TestFlight upload was rejected.
    # macos-14 (Xcode 15 / Swift 5.10) cannot compile Firebase 11.x at all.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Sanity-check iOS secrets
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: |
          : "${ASC_KEY_ID:?ASC_KEY_ID secret is empty}"
          : "${ASC_ISSUER_ID:?ASC_ISSUER_ID secret is empty}"
          : "${ASC_KEY_CONTENT:?ASC_KEY_CONTENT secret is empty}"
          echo "All required iOS secrets are present."

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Create build keychain
        env:
          KEY_PWD: ${{ secrets.MATCH_KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEY_PWD" build_keychain
          security default-keychain -s build_keychain
          security unlock-keychain -p "$KEY_PWD" build_keychain
          security set-keychain-settings -lut 21600 build_keychain
          # Add login keychain back to search list so system certs are visible
          security list-keychains -s build_keychain login.keychain

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Run fastlane ios beta
        env:
          MATCH_GIT_URL:      ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD:     ${{ secrets.MATCH_PASSWORD }}
          ASC_KEY_ID:         ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID:      ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT:    ${{ secrets.ASC_KEY_CONTENT }}
          MATCH_KEYCHAIN_NAME: build_keychain
          MATCH_KEYCHAIN_PASSWORD: ${{ secrets.MATCH_KEYCHAIN_PASSWORD }}
        run: bundle exec fastlane ios beta
