name: pacelli
description: "A household management app born from love and peace."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase - Backend (auth, database, real-time)
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5

  # End-to-end encryption
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  flutter_secure_storage: ^9.2.4

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # UI & Icons
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.16
  google_fonts: ^6.2.1
  lucide_icons: ^0.257.0

  # Local Storage (for caching preferences)
  shared_preferences: ^2.3.4

  # Local SQLite database (offline-first backend)
  sqflite: ^2.3.3+2
  path: ^1.9.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  equatable: ^2.0.7

  # Google Sign-In
  google_sign_in: ^6.2.2
  crypto: ^3.0.6  # Used for HKDF key derivation in E2E encryption

  # Calendar & Animations
  table_calendar: ^3.1.2
  confetti: ^0.7.0

  # Google Drive file attachments
  googleapis: ^13.0.0
  googleapis_auth: ^1.6.0
  http: ^1.2.0
  file_picker: ^8.0.0
  image_picker: ^1.1.0
  path_provider: ^2.1.0
  mime: ^1.0.0
  url_launcher: ^6.2.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  share_plus: ^12.0.1

  # Markdown rendering (House Manual)
  flutter_markdown: ^0.7.4

  # Barcode scanning & QR code generation (Inventory Phase 2)
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^5.0.0

  # Code generation (for Riverpod)
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.13

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/icons/
